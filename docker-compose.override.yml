# Local development overrides
# This file is automatically loaded by docker-compose and adds
# port bindings for local development without nginx.
#
# For production deployment on Hetzner VPS, use:
#   docker-compose -f docker-compose.yml up
#
# For local development with port bindings:
#   docker-compose up (automatically includes this override file)

version: '3.8'

services:
  newssite_api:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./scrapers:/app/scrapers
      - ./story_writer:/app/story_writer
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  newssite_web:
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

networks:
  web:
    external: false
    driver: bridge
